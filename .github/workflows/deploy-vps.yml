name: Deploy backend na VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.VPS_BACKEND_PATH }}"
            git fetch
            git pull origin main
            npm i --legacy-peer-deps
            npm run build
            pm2 restart all
